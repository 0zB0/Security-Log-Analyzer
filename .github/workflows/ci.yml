name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - name: Install backend
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install -e "apps/api[dev]"
      - name: Lint
        run: ruff check apps/api/tracehawk_api apps/api/tests tools
      - name: Test and coverage
        run: pytest apps/api/tests --cov=tracehawk_api --cov-report=term --cov-report=xml:coverage.xml -W error -q
      - name: Dependency audit
        run: pip-audit --progress-spinner off
      - name: Performance smoke
        run: python tools/benchmark_analysis.py --profile smoke --check
      - name: Public documentation links
        run: python tools/check_markdown_links.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web
        run: npm --prefix apps/web ci
      - name: Dependency audit
        run: npm --prefix apps/web audit --omit=dev --audit-level=high
      - name: Build web
        run: npm --prefix apps/web run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Semgrep
        run: |
          python -m pip install semgrep==1.164.0
          semgrep scan --config p/python --config p/typescript --exclude-rule python.django.security.injection.raw-html-format.raw-html-format --error apps/api/tracehawk_api apps/web/src tools

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - security
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t tracehawk:ci .
