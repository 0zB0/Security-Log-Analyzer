name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.lock
      - name: Install backend
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install --constraint apps/api/requirements.lock -e "apps/api[dev]"
      - name: Lint
        run: ruff check --no-cache apps/api/tracehawk_api apps/api/migrations apps/api/tests tools
      - name: Type check stable backend boundaries
        run: cd apps/api && mypy
      - name: Generated API contract drift
        run: python tools/generate_api_contract.py --check
      - name: Test and coverage
        run: pytest apps/api/tests --cov=tracehawk_api --cov-report=term --cov-report=xml:coverage.xml --cov-fail-under=85 -W error -q
      - name: Dependency audit
        run: pip-audit --progress-spinner off
      - name: Performance smoke
        run: python tools/benchmark_analysis.py --profile smoke --check
      - name: Public documentation links
        run: python tools/check_markdown_links.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web
        run: npm --prefix apps/web ci
      - name: Dependency audit
        run: npm --prefix apps/web audit --omit=dev --audit-level=high
      - name: Test and coverage
        run: npm --prefix apps/web run test:coverage -- --testTimeout=15000
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-coverage
          path: apps/web/coverage/
          if-no-files-found: error
      - name: Build web
        run: npm --prefix apps/web run build
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install browser-test backend
        run: python -m pip install --constraint apps/api/requirements.lock -e apps/api
      - name: Install Chromium
        run: npx --prefix apps/web playwright install --with-deps chromium
      - name: Private workspace browser end-to-end test
        env:
          TRACEHAWK_PYTHON: python
        run: npm --prefix apps/web run test:e2e
      - name: Public demo browser end-to-end test
        env:
          TRACEHAWK_PYTHON: python
        run: npm --prefix apps/web run test:e2e:public
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-evidence
          path: |
            apps/web/playwright-report/
            apps/web/playwright-report-public/
            apps/web/test-results/
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Semgrep
        run: |
          python -m pip install semgrep==1.164.0
          semgrep scan --config p/python --config p/typescript --exclude-rule python.django.security.injection.raw-html-format.raw-html-format --sarif --output semgrep.sarif --error apps/api/tracehawk_api apps/api/migrations apps/web/src tools
      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: semgrep.sarif

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - security
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build image
        run: docker build -t tracehawk:ci .
      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: tracehawk:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
