name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.lock
      - name: Install backend
        run: |
          python -m pip install --upgrade pip==26.1.2
          python -m pip install --constraint apps/api/requirements.lock -e "apps/api[dev]"
      - name: Lint
        run: ruff check --no-cache apps/api/tracehawk_api apps/api/migrations apps/api/tests tools
      - name: Type check stable backend boundaries
        run: cd apps/api && mypy
      - name: Test and coverage
        run: pytest apps/api/tests --cov=tracehawk_api --cov-report=term --cov-report=xml:coverage.xml --cov-fail-under=85 -W error -q
      - name: Dependency audit
        run: pip-audit --progress-spinner off
      - name: Performance smoke
        run: python tools/benchmark_analysis.py --profile smoke --check
      - name: Public documentation links
        run: python tools/check_markdown_links.py

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web
        run: npm --prefix apps/web ci
      - name: Dependency audit
        run: npm --prefix apps/web audit --omit=dev --audit-level=high
      - name: Test and coverage
        run: npm --prefix apps/web run test:coverage
      - name: Build web
        run: npm --prefix apps/web run build

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Semgrep
        run: |
          python -m pip install semgrep==1.164.0
          semgrep scan --config p/python --config p/typescript --exclude-rule python.django.security.injection.raw-html-format.raw-html-format --sarif --output semgrep.sarif --error apps/api/tracehawk_api apps/api/migrations apps/web/src tools
      - name: Upload Semgrep SARIF
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - web
      - security
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t tracehawk:ci .
