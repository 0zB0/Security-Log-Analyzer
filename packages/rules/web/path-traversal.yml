id: web-path-traversal-001
title: Web path traversal attempt
description: A web request attempted directory traversal or direct access to operating system paths.
severity: high
confidence: high
log_types:
  - web_access
mitre:
  tactic: Initial Access
  technique_id: T1190
  technique_name: Exploit Public-Facing Application
conditions:
  event_type: http_request
  field_contains_any:
    url_target:
      - ../
      - ..%2f
      - /etc/passwd
      - /etc/shadow
  group_by:
    - source_ip
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Security scanner validating traversal exposure.
recommendations:
  - Confirm the application did not serve sensitive files.
  - Review adjacent requests from the same source IP.
  - Add WAF or reverse proxy filtering for traversal payloads.

