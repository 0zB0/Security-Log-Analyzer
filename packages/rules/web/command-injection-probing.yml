id: web-command-injection-probing-001
title: Command injection probing
description: A web request contained shell metacharacters or command execution probes.
severity: high
confidence: medium
log_types:
  - web_access
mitre:
  tactic: Initial Access
  technique_id: T1190
  technique_name: Exploit Public-Facing Application
conditions:
  event_type: http_request
  field_contains_any:
    url_target:
      - "%3B"
      - ";cat"
      - "|id"
      - "`id`"
      - "$("
  group_by:
    - source_ip
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Approved dynamic application test.
recommendations:
  - Review server-side request handling and command execution logs.
  - Add input validation and escaping where relevant.

