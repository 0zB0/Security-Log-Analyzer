id: csv-auth-failure-burst-001
title: CSV authentication failure burst
description: CSV security events show repeated authentication failures from one source and user.
severity: high
confidence: medium
log_types:
  - csv_log
mitre:
  tactic: Credential Access
  technique_id: T1110
  technique_name: Brute Force
conditions:
  field_contains_any:
    event_type:
      - fail
      - denied
      - reject
  group_by:
    - source_ip
    - username
  window_minutes: 10
  count_gte: 5
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - User repeatedly mistyped a password.
  - Misconfigured service used stale credentials.
recommendations:
  - Confirm whether a successful login followed the failures.
  - Review source IP ownership and expected access path.
