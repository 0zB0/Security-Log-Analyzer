id: sudo-firewall-disable-001
title: Privileged firewall disable or flush
description: A sudo command attempted to disable host firewall controls.
severity: critical
confidence: medium
log_types:
  - linux_auth
mitre:
  tactic: Defense Evasion
  technique_id: T1562.004
  technique_name: Disable or Modify System Firewall
conditions:
  event_type: sudo_command
  field_contains_any:
    command:
      - ufw disable
      - iptables -F
      - nft flush ruleset
      - systemctl stop firewalld
  group_by:
    - username
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Approved network troubleshooting.
recommendations:
  - Confirm the maintenance window and restore expected firewall rules.
  - Review adjacent login and privilege escalation activity.

