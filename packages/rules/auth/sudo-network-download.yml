id: sudo-network-download-001
title: Privileged network download command
description: A sudo command downloaded remote content, which can precede tool staging.
severity: medium
confidence: medium
log_types:
  - linux_auth
mitre:
  tactic: Command and Control
  technique_id: T1105
  technique_name: Ingress Tool Transfer
correlation:
  family: command_and_control
  incident_title: Privileged sudo activity
  behaviors: [privileged_action]
  entity_fields: [username, host]
  max_gap_minutes: 30
conditions:
  event_type: sudo_command
  field_contains_any:
    command:
      - curl http
      - curl -k
      - wget http
      - wget -q
  group_by:
    - username
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Approved package bootstrap or installer script.
recommendations:
  - Validate the URL reputation and downloaded file hash.
  - Review subsequent execution events.
