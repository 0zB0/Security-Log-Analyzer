id: sudo-user-management-001
title: Privileged user management command
description: A sudo command attempted to create, modify, or delete a local account.
severity: high
confidence: medium
log_types:
  - linux_auth
mitre:
  tactic: Persistence
  technique_id: T1136.001
  technique_name: Local Account
conditions:
  event_type: sudo_command
  field_contains_any:
    command:
      - useradd
      - adduser
      - usermod
      - userdel
  group_by:
    - username
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Approved administrator account lifecycle work.
recommendations:
  - Confirm the change ticket or administrator intent.
  - Review authentication events immediately before and after the command.
  - Inspect the created or modified account for persistence risk.

