id: kubernetes-secret-read-001
title: Kubernetes secret read or list
description: A Kubernetes secret was read, listed, or watched.
severity: high
confidence: medium
log_types:
  - kubernetes_audit
mitre:
  tactic: Credential Access
  technique_id: T1552
  technique_name: Unsecured Credentials
conditions:
  field_in:
    verb:
      - get
      - list
      - watch
  field_equals:
    objectRef.resource: secrets
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Approved controller or deployment automation reading required secrets.
recommendations:
  - Confirm whether the actor normally reads secrets in this namespace.
  - Review RBAC bindings for excessive secret access.
