id: zeek-dns-burst-001
title: Zeek DNS burst
description: Zeek DNS logs show repeated queries from one source in a short window.
severity: medium
confidence: medium
log_types:
  - zeek_json
  - zeek_tsv
mitre:
  tactic: Command and Control
  technique_id: T1071.004
  technique_name: DNS
correlation:
  family: dns
  behaviors: [dns_burst]
  entity_fields: [source_ip]
  max_gap_minutes: 15
conditions:
  event_type: zeek_dns
  group_by:
    - source_ip
  window_minutes: 2
  count_gte: 5
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Browser startup or endpoint reconnect.
  - DNS-heavy internal service startup.
recommendations:
  - Review queried domains and answer data.
  - Compare source DNS rate with baseline.
  - Check for related HTTP, TLS, or Suricata alerts.
