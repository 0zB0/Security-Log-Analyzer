id: zeek-admin-service-access-001
title: Zeek administrative service access
description: Zeek connection logs show access to administrative service ports.
severity: high
confidence: medium
log_types:
  - zeek_json
  - zeek_tsv
mitre:
  tactic: Lateral Movement
  technique_id: T1021
  technique_name: Remote Services
conditions:
  event_type: zeek_conn
  field_equals:
    transport_protocol: tcp
  field_in:
    destination_port:
      - 22
      - 2222
      - 3389
      - 5900
  group_by:
    - source_ip
    - destination_ip
    - destination_port
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Approved administrator session.
  - Backup or monitoring system using SSH.
recommendations:
  - Confirm the peer, account, and change window.
  - Pivot to host authentication logs for the same timestamp.
  - Restrict administrative services to approved networks.
