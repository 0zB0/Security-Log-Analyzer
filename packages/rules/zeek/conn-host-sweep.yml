id: zeek-conn-host-sweep-001
title: Zeek host sweep pattern
description: Zeek connection logs show one source contacting the same service across many hosts.
severity: high
confidence: medium
log_types:
  - zeek_json
  - zeek_tsv
mitre:
  tactic: Discovery
  technique_id: T1046
  technique_name: Network Service Discovery
correlation:
  family: network_scan
  behaviors: [network_scan]
  entity_fields: [source_ip, destination_ip]
  max_gap_minutes: 15
conditions:
  event_type: zeek_conn
  field_equals:
    transport_protocol: tcp
  group_by:
    - source_ip
    - destination_port
  window_minutes: 2
  distinct_field: destination_ip
  distinct_count_gte: 10
evidence:
  include_matching_lines: true
  max_lines: 30
false_positives:
  - Approved vulnerability scan.
  - Monitoring system checking service health across hosts.
recommendations:
  - Confirm whether the source was approved to scan.
  - Review destination scope and any successful follow-on sessions.
  - Preserve related Zeek conn and Suricata alert records.
