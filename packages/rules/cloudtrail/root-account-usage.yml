id: cloudtrail-root-account-usage-001
title: CloudTrail root account usage
description: AWS root identity activity was observed and should be reviewed.
severity: critical
confidence: high
log_types:
  - cloudtrail
mitre:
  tactic: Defense Evasion
  technique_id: T1078.004
  technique_name: Cloud Accounts
conditions:
  field_equals:
    userIdentity.type: Root
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Break-glass administrative action during a documented maintenance window.
recommendations:
  - Confirm the business reason for root usage.
  - Verify MFA, source IP, and account contact alerts.
