id: cloudtrail-logging-disabled-001
title: CloudTrail logging disabled or modified
description: CloudTrail logging was stopped, deleted, or materially changed.
severity: critical
confidence: high
log_types:
  - cloudtrail
mitre:
  tactic: Defense Evasion
  technique_id: T1562.008
  technique_name: Disable Cloud Logs
conditions:
  field_in:
    eventName:
      - StopLogging
      - DeleteTrail
      - UpdateTrail
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Planned logging migration with temporary duplicate trails.
recommendations:
  - Verify whether logging coverage was interrupted.
  - Re-enable or replace the trail and review activity during the gap.
