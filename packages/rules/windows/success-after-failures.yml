id: windows-success-after-failures-001
title: Windows successful logon after failures
description: A successful Windows logon followed repeated failures for the same source and user.
severity: critical
confidence: high
log_types:
  - windows_event
mitre:
  tactic: Defense Evasion
  technique_id: T1078
  technique_name: Valid Accounts
conditions:
  sequence:
    - event_type: windows_logon_failure
      count_gte: 5
    - event_type: windows_logon_success
  group_by:
    - source_ip
    - username
  window_minutes: 15
evidence:
  include_matching_lines: true
  max_lines: 25
false_positives:
  - Legitimate user retried a password before succeeding.
recommendations:
  - Confirm whether the successful logon was expected.
  - Review follow-on process, share, and privilege activity.
