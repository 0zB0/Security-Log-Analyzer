id: windows-failed-logon-burst-001
title: Windows failed logon burst
description: Repeated Windows failed logons from one source and target user.
severity: high
confidence: medium
log_types:
  - windows_event
mitre:
  tactic: Credential Access
  technique_id: T1110
  technique_name: Brute Force
conditions:
  event_type: windows_logon_failure
  group_by:
    - source_ip
    - username
  window_minutes: 10
  count_gte: 5
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - User or service account with stale credentials.
recommendations:
  - Validate the source host and account owner.
  - Check for a later successful logon from the same source.
