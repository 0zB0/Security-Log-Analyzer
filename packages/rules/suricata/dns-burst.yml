id: suricata-dns-burst-001
title: Suricata DNS burst
description: Suricata EVE DNS records show repeated queries from one source in a short window.
severity: medium
confidence: medium
log_types:
  - suricata_eve
mitre:
  tactic: Command and Control
  technique_id: T1071.004
  technique_name: DNS
conditions:
  event_type: suricata_dns
  group_by:
    - source_ip
  window_minutes: 2
  count_gte: 5
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Browser startup or endpoint reconnect after outage.
  - Legitimate service resolving many domains.
recommendations:
  - Review queried domains and resolver logs.
  - Compare the source host with normal DNS volume.
  - Check whether the same host has IDS alerts in the same window.
