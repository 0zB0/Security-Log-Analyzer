id: suricata-alert-burst-001
title: Suricata alert burst
description: Suricata EVE shows multiple IDS alerts from one source in a short window.
severity: high
confidence: medium
log_types:
  - suricata_eve
mitre:
  tactic: Discovery
  technique_id: T1595.002
  technique_name: Vulnerability Scanning
conditions:
  event_type: suricata_alert
  group_by:
    - source_ip
  window_minutes: 5
  count_gte: 3
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - Approved vulnerability scanner.
  - IDS rule tuning exercise.
recommendations:
  - Confirm whether the source is in the approved scan scope.
  - Review destination services and any follow-on authentication attempts.
  - Preserve the matching EVE records with content hashes.
