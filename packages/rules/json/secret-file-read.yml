id: json-secret-file-read-001
title: JSON secret file read
description: JSON file events show reads of sensitive secret or credential paths.
severity: high
confidence: medium
log_types:
  - json_log
mitre:
  tactic: Credential Access
  technique_id: T1552.001
  technique_name: Credentials In Files
conditions:
  field_contains_any:
    file.path:
      - /.env
      - id_rsa
      - /etc/shadow
      - secrets.yml
  group_by:
    - host
    - username
evidence:
  include_matching_lines: true
  max_lines: 10
false_positives:
  - Approved backup, deployment, or security scanning.
recommendations:
  - Confirm the process and user that read the file.
  - Rotate exposed credentials if access was unexpected.

