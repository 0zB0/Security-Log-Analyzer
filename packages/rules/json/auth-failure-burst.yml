id: json-auth-failure-burst-001
title: JSON authentication failure burst
description: JSON events show repeated authentication failures from one source and user.
severity: high
confidence: medium
log_types:
  - json_log
mitre:
  tactic: Credential Access
  technique_id: T1110
  technique_name: Brute Force
conditions:
  event_type: authentication_failure
  group_by:
    - source_ip
    - username
  window_minutes: 10
  count_gte: 5
evidence:
  include_matching_lines: true
  max_lines: 20
false_positives:
  - User or integration with stale credentials.
recommendations:
  - Validate the source and account owner.
  - Look for successful authentication after the failures.

